name: Release on Merge to Main

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract plugin version
        id: version
        run: |
          VERSION=$(grep -m1 '^\s*\*\s*Version:' blt-tube.php | sed 's/.*Version:\s*//' | tr -d '[:space:]')
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check whether tag already exists
        id: tag_check
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v${{ steps.version.outputs.value }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.value }} already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.value }} not found — will create release."
          fi

      - name: Set up PHP
        if: steps.tag_check.outputs.exists == 'false'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install Composer dependencies
        if: steps.tag_check.outputs.exists == 'false'
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Build release zip
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          PLUGIN_SLUG="blt-tube"
          VERSION="${{ steps.version.outputs.value }}"
          STAGING="/tmp/${PLUGIN_SLUG}"
          ZIP_NAME="${PLUGIN_SLUG}-v${VERSION}.zip"

          mkdir -p "$STAGING/$PLUGIN_SLUG"

          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            ./ "$STAGING/$PLUGIN_SLUG/"

          (cd "$STAGING" && zip -r "$ZIP_NAME" "$PLUGIN_SLUG/")
          mv "$STAGING/$ZIP_NAME" "/tmp/$ZIP_NAME"

          echo "zip_path=/tmp/$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
        id: build_zip

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: BLT Tube v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: ${{ steps.build_zip.outputs.zip_path }}
